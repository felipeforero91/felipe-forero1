<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover" />
  <title>Focus Master - Felipe Forero</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    :root{
      --bg:#0b0f14;
      --panel:#0f1620;
      --panel2:#101b28;
      --text:#e7eef9;
      --muted:#a7b3c7;
      --line:#1f2a3a;
      --good:#1bd37a;
      --bad:#ff4d6d;
      --btn:#172334;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius:20px;
      --ripple: rgba(231,238,249,.1);
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
    body{
      margin:0; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      overflow-x:hidden; user-select:none;
    }

    /* Splash Screen */
    #splash{
      position:fixed; inset:0; background:var(--bg); z-index:9999;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      transition: opacity .5s ease, visibility .5s;
    }
    #splash.hide{ opacity:0; visibility:hidden; }
    .logo{
      width:80px; height:80px; position:relative;
      background: linear-gradient(135deg, var(--good), #5856D6);
      border-radius:22px; margin-bottom:20px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} }

    /* Layout Principal */
    .app-container{ max-width:500px; margin:0 auto; padding-bottom:100px; }
    header{ padding:40px 24px 20px; }
    .kpi-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;}
    
    .circle-box{ position:relative; width:100px; height:100px; }
    svg.circle-svg{ width:100px; height:100px; transform:rotate(-90deg); }
    .circle-bg{ fill:none; stroke:var(--line); stroke-width:8; }
    .circle-val{ fill:none; stroke:var(--good); stroke-width:8; stroke-linecap:round; transition: stroke-dashoffset 0.6s ease; }
    .circle-txt{ 
      position:absolute; inset:0; display:flex; align-items:center; 
      justify-content:center; font-weight:800; font-size:20px; 
    }

    /* Tabs de Días */
    .days-nav{ 
      display:flex; overflow-x:auto; padding:0 20px; gap:10px; 
      scrollbar-width:none; margin-bottom:30px;
    }
    .day-btn{
      background:var(--btn); border:none; color:var(--muted);
      padding:12px 20px; border-radius:14px; font-weight:700;
      white-space:nowrap; transition:all 0.3s;
    }
    .day-btn.active{ background:var(--good); color:var(--bg); transform:scale(1.05); }

    /* Tareas */
    .tasks-list{ padding:0 20px; display:flex; flex-direction:column; gap:15px; }
    .task-card{
      background:var(--panel); border-radius:var(--radius); padding:20px;
      border:1px solid var(--line); position:relative; overflow:hidden;
    }
    .task-card.done{ border-left:6px solid var(--good); }
    .task-card.missed{ border-left:6px solid var(--bad); opacity:0.7; }
    
    .task-info h3{ margin:0; font-size:18px; }
    .task-meta{ font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }

    .btn-group{ display:flex; gap:8px; margin-top:15px; }
    .btn-action{
      flex:1; padding:10px; border-radius:10px; border:none; 
      font-weight:700; font-size:13px; cursor:pointer;
      background: var(--btn); color: var(--text); transition: 0.2s;
    }
    .btn-action.active-good{ background:var(--good); color:var(--bg); }
    .btn-action.active-bad{ background:var(--bad); color:white; }

    /* Gráfico */
    .chart-container{ padding:20px; margin:20px; background:var(--panel); border-radius:var(--radius); }

    /* Nav Inferior */
    .bottom-nav{
      position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:500px; background:rgba(15,22,32,0.9);
      backdrop-filter:blur(15px); padding:20px; border-top:1px solid var(--line);
      display:flex; justify-content:space-around; z-index:1000;
    }
    .nav-item{ background:none; border:none; color:var(--muted); font-size:24px; }
    .nav-item.active{ color:var(--good); }

  </style>
</head>
<body>

<div id="splash">
  <div class="logo"></div>
  <h2 style="font-weight:800; letter-spacing:2px">FOCUS MASTER</h2>
</div>

<div class="app-container">
  <header>
    <div class="kpi-row">
      <div>
        <p class="task-meta" id="current-date-txt">MARTES 3 MARZO</p>
        <h1 id="kpi-weight-txt" style="margin:0; font-size:32px;">84.5kg</h1>
        <p class="task-meta">Meta: 80.0kg</p>
      </div>
      <div class="circle-box">
        <svg class="circle-svg">
          <circle class="circle-bg" cx="50" cy="50" r="42"/>
          <circle id="progress-circle" class="circle-val" cx="50" cy="50" r="42" stroke-dasharray="264" stroke-dashoffset="264"/>
        </svg>
        <div class="circle-txt" id="progress-pct">0%</div>
      </div>
    </div>
  </header>

  <nav class="days-nav" id="days-nav"></nav>

  <div class="chart-container">
    <canvas id="mainChart"></canvas>
  </div>

  <div class="tasks-list" id="tasks-list"></div>
</div>

<nav class="bottom-nav">
  <button class="nav-item active">●</button>
  <button class="nav-item" onclick="exportData()">💾</button>
  <button class="nav-item" onclick="resetData()">⚙️</button>
</nav>

<script>
  /** ========= CONFIGURACIÓN Y ESTADO ========= */
  const LS_KEY = "focus_felipe_v4";
  const DAYS = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];
  
  const GOALS = {
    musica: { name: "Producción Musical", weight: 5 },
    gym: { name: "Gimnasio & Fitness", weight: 4 },
    tatuaje: { name: "Práctica de Tatuaje", weight: 4 },
    foto: { name: "Edición Foto/Video", weight: 3 },
    skate: { name: "Skateboarding", weight: 2 },
    portugues: { name: "Portugués", weight: 1 },
    animacion: { name: "Animación", weight: 2 }
  };

  const WEEK_PLAN = {
    "Lunes": ["musica", "gym", "portugues"],
    "Martes": ["musica", "tatuaje", "foto"],
    "Miércoles": ["musica", "gym", "skate"],
    "Jueves": ["musica", "tatuaje", "foto"],
    "Viernes": ["musica", "gym", "animacion"],
    "Sábado": ["musica", "skate", "foto"],
    "Domingo": [] // Descanso
  };

  let state = {
    selectedDay: DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1],
    data: JSON.parse(localStorage.getItem(LS_KEY)) || {
      logs: {}, // { "Lunes": { "musica": "yes" } }
      weightHistory: [{ date: new Date().toISOString(), weight: 84.5 }]
    }
  };

  let chart = null;

  /** ========= LÓGICA DE DATOS ========= */

  function save() {
    localStorage.setItem(LS_KEY, JSON.stringify(state.data));
    updateUI();
  }

  function setStatus(day, goalId, status) {
    if (!state.data.logs[day]) state.data.logs[day] = {};
    
    // Si ya tiene ese estado, lo quitamos (toggle)
    if (state.data.logs[day][goalId] === status) {
      delete state.data.logs[day][goalId];
    } else {
      state.data.logs[day][goalId] = status;
      
      // Si es Gym y marca "Cumplí", pedir peso
      if (goalId === 'gym' && status === 'yes') {
        const p = prompt("Peso actual (kg):", state.data.weightHistory.slice(-1)[0].weight);
        if (p) {
          state.data.weightHistory.push({ date: new Date().toISOString(), weight: parseFloat(p) });
        }
      }
    }
    save();
  }

  /** ========= INTERFAZ DE USUARIO (UI) ========= */

  function updateUI() {
    renderDays();
    renderTasks();
    renderStats();
    renderChart();
  }

  function renderDays() {
    const nav = document.getElementById("days-nav");
    nav.innerHTML = "";
    DAYS.forEach(d => {
      const btn = document.createElement("button");
      btn.className = `day-btn ${state.selectedDay === d ? 'active' : ''}`;
      btn.innerText = d;
      btn.onclick = () => { state.selectedDay = d; updateUI(); };
      nav.appendChild(btn);
    });
  }

  function renderTasks() {
    const list = document.getElementById("tasks-list");
    list.innerHTML = "";
    const todayTasks = WEEK_PLAN[state.selectedDay] || [];
    const dayLogs = state.data.logs[state.selectedDay] || {};

    if (todayTasks.length === 0) {
      list.innerHTML = "<p style='text-align:center; color:var(--muted)'>Hoy es día de descanso total. 🧘‍♂️</p>";
      return;
    }

    todayTasks.forEach(tid => {
      const g = GOALS[tid];
      const status = dayLogs[tid];
      
      const card = document.createElement("div");
      card.className = `task-card ${status === 'yes' ? 'done' : status === 'no' ? 'missed' : ''}`;
      
      card.innerHTML = `
        <div class="task-info">
          <p class="task-meta">${tid === 'musica' || tid === 'tatuaje' ? 'Prioridad Alta' : 'Hábito'}</p>
          <h3>${g.name}</h3>
        </div>
        <div class="btn-group">
          <button class="btn-action ${status === 'yes' ? 'active-good' : ''}" onclick="setStatus('${state.selectedDay}', '${tid}', 'yes')">CUMPLÍ</button>
          <button class="btn-action ${status === 'no' ? 'active-bad' : ''}" onclick="setStatus('${state.selectedDay}', '${tid}', 'no')">FALLÉ</button>
        </div>
      `;
      list.appendChild(card);
    });
  }

  function renderStats() {
    const dayTasks = WEEK_PLAN[state.selectedDay] || [];
    const dayLogs = state.data.logs[state.selectedDay] || {};
    
    let totalWeight = 0;
    let earnedWeight = 0;

    dayTasks.forEach(tid => {
      totalWeight += GOALS[tid].weight;
      if (dayLogs[tid] === 'yes') earnedWeight += GOALS[tid].weight;
    });

    const pct = totalWeight > 0 ? Math.round((earnedWeight / totalWeight) * 100) : 100;
    
    // Actualizar Círculo
    const circle = document.getElementById("progress-circle");
    const pctTxt = document.getElementById("progress-pct");
    const offset = 264 - (264 * pct / 100);
    circle.style.strokeDashoffset = offset;
    pctTxt.innerText = `${pct}%`;

    // Actualizar Peso KPI
    const lastW = state.data.weightHistory.slice(-1)[0].weight;
    document.getElementById("kpi-weight-txt").innerText = `${lastW}kg`;
    document.getElementById("current-date-txt").innerText = state.selectedDay.toUpperCase() + " " + new Date().getDate() + " MARZO";
  }

  function renderChart() {
    const ctx = document.getElementById('mainChart').getContext('2d');
    const chartData = DAYS.map(d => {
      const tasks = WEEK_PLAN[d] || [];
      const logs = state.data.logs[d] || {};
      let tw = 0, ew = 0;
      tasks.forEach(tid => { tw += GOALS[tid].weight; if(logs[tid] === 'yes') ew += GOALS[tid].weight; });
      return tw > 0 ? Math.round((ew / tw) * 100) : 0;
    });

    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ["L", "M", "X", "J", "V", "S", "D"],
        datasets: [{
          label: '% Cumplimiento',
          data: chartData,
          backgroundColor: '#1bd37a',
          borderRadius: 8,
        }]
      },
      options: {
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, max: 100, grid: { color: '#1f2a3a' } } }
      }
    });
  }

  /** ========= FUNCIONES EXTRA ========= */
  function exportData() {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state.data));
    const downloadAnchorNode = document.createElement('a');
    downloadAnchorNode.setAttribute("href",     dataStr);
    downloadAnchorNode.setAttribute("download", "focus_master_backup.json");
    document.body.appendChild(downloadAnchorNode);
    downloadAnchorNode.click();
    downloadAnchorNode.remove();
  }

  function resetData() {
    if(confirm("¿Seguro que quieres borrar todo el progreso?")) {
      localStorage.removeItem(LS_KEY);
      location.reload();
    }
  }

  // Quitar Splash
  window.onload = () => {
    setTimeout(() => {
      document.getElementById("splash").classList.add("hide");
      updateUI();
    }, 1500);
  };

</script>
</body>
</html>
