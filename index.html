<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus Master Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --apple-blue: #007AFF; --apple-gray: #1C1C1E; }
        body { background-color: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; }
        .ios-card { background: var(--apple-gray); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .active-tab { color: var(--apple-blue) !important; }
        .progress-ring { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
    </style>
</head>
<body class="pb-32">

    <div class="p-6 pt-12 space-y-6">
        <div class="flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-white">Focus Master</h1>
                <p id="currentDate" class="text-gray-500 font-medium"></p>
            </div>
            <div class="text-right">
                <span id="globalProgress" class="text-blue-500 text-2xl font-black">0%</span>
                <p class="text-[10px] uppercase text-gray-500 tracking-widest">Cumplimiento Total</p>
            </div>
        </div>

        <div class="ios-card p-5 flex items-center justify-between shadow-2xl">
            <div class="flex items-center gap-4">
                <div class="bg-blue-500/20 p-3 rounded-2xl">
                    <i data-lucide="scale" class="text-blue-500"></i>
                </div>
                <div>
                    <p class="text-xs text-gray-400">Peso Actual</p>
                    <h2 id="displayWeight" class="text-2xl font-bold">84.5 kg</h2>
                </div>
            </div>
            <button onclick="updateWeight()" class="bg-white/10 px-4 py-2 rounded-xl text-sm font-semibold hover:bg-white/20 transition">Registrar</button>
        </div>
    </div>

    <div class="px-6 space-y-4">
        <h3 class="text-sm font-bold text-gray-500 uppercase tracking-widest ml-1">Horario del Día</h3>
        
        <div id="taskList" class="space-y-3">
            </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-black/80 backdrop-blur-xl border-t border-white/10 px-10 py-6 flex justify-between items-center z-50">
        <button class="active-tab flex flex-col items-center gap-1"><i data-lucide="calendar"></i><span class="text-[10px]">Hoy</span></button>
        <button class="text-gray-500 flex flex-col items-center gap-1" onclick="alert('Estadísticas detalladas en desarrollo...')"><i data-lucide="bar-chart-3"></i><span class="text-[10px]">Stats</span></button>
        <button class="text-gray-500 flex flex-col items-center gap-1" onclick="window.open('https://www.youtube.com', '_blank')"><i data-lucide="play-circle"></i><span class="text-[10px]">Cursos</span></button>
    </nav>

    <script>
        // CONFIGURACIÓN DE TAREAS (Aquí está la lógica que pediste)
        const taskData = [
            { id: 1, time: '08:30', title: 'Música 🎵', cat: 'PROYECTO CORE', type: 'simple' },
            { id: 2, time: '10:00', title: 'Gimnasio 🏋️‍♂️', cat: 'FITNESS', type: 'gym' },
            { id: 3, time: '12:00', title: 'Trabajo Freelance', cat: 'TRABAJO', type: 'lock' },
            { id: 4, time: '16:00', title: 'Tatuaje 🎨', cat: 'PROYECTO CORE', type: 'simple' },
            { id: 5, time: '17:00', title: 'Trabajo Freelance', cat: 'TRABAJO', type: 'lock' },
            { id: 6, time: '20:00', title: 'Foto & Video 📸', cat: 'MULTIMEDIA', type: 'simple' }
        ];

        // INICIALIZACIÓN
        let userProgress = JSON.parse(localStorage.getItem('focus_progress')) || {};
        let currentWeight = localStorage.getItem('focus_weight') || 84.5;

        function init() {
            lucide.createIcons();
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
            document.getElementById('displayWeight').innerText = currentWeight + " kg";
            renderTasks();
            updateGlobalUI();
        }

        function renderTasks() {
            const container = document.getElementById('taskList');
            container.innerHTML = '';

            taskData.forEach(task => {
                const isDone = userProgress[task.id] ? 'bg-blue-600 border-blue-600' : 'border-gray-600';
                const checkIcon = userProgress[task.id] ? '<i data-lucide="check" class="text-white w-4 h-4"></i>' : '';
                
                const html = `
                    <div class="ios-card p-4 flex items-center justify-between ${task.type === 'lock' ? 'opacity-40' : ''}">
                        <div class="flex items-center gap-4">
                            <span class="text-xs font-bold text-gray-500 w-10">${task.time}</span>
                            <div>
                                <h4 class="font-bold text-white">${task.title}</h4>
                                <p class="text-[10px] text-blue-500 font-bold uppercase tracking-tighter">${task.cat}</p>
                            </div>
                        </div>
                        ${task.type !== 'lock' ? `
                            <button onclick="handleTask(${task.id}, '${task.type}')" class="w-7 h-7 rounded-full border-2 flex items-center justify-center transition-all ${isDone}">
                                ${checkIcon}
                            </button>
                        ` : '<i data-lucide="lock" class="w-4 text-gray-600"></i>'}
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
            lucide.createIcons();
        }

        function handleTask(id, type) {
            if (userProgress[id]) {
                delete userProgress[id];
            } else {
                userProgress[id] = true;
                if(type === 'gym') {
                    const confirmGym = confirm("¿Registraste tu peso y completaste la rutina de hoy?");
                    if(!confirmGym) delete userProgress[id];
                }
            }
            saveAndRefresh();
        }

        function updateWeight() {
            const val = prompt("Ingresa tu peso actual:", currentWeight);
            if(val) {
                currentWeight = val;
                localStorage.setItem('focus_weight', val);
                document.getElementById('displayWeight').innerText = val + " kg";
                alert("¡Peso actualizado! Meta: 80.0 kg");
            }
        }

        function saveAndRefresh() {
            localStorage.setItem('focus_progress', JSON.stringify(userProgress));
            renderTasks();
            updateGlobalUI();
        }

        function updateGlobalUI() {
            const totalTasks = taskData.filter(t => t.type !== 'lock').length;
            const completed = Object.keys(userProgress).length;
            const percent = Math.round((completed / totalTasks) * 100);
            document.getElementById('globalProgress').innerText = percent + "%";
        }

        init();
    </script>
</body>
</html>
